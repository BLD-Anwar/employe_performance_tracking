<!DOCTYPE html>
<html lang="en">
<head>
<script>window.location.replace("/login.html");</script>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgriPulse — HR Login</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Inter', sans-serif; }
  .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.4); }
</style>
<script src="../assets/js/hr-auth-store.js"></script>
</head>
<body class="bg-gradient-to-br from-[#0c241a] via-[#091510] to-[#040806] min-h-screen flex items-center justify-center p-6">
  <div class="w-full max-w-md">
    <!-- Brand logo -->
    <div class="flex flex-col items-center mb-8">
      <div class="w-16 h-16 bg-emerald-500/10 border border-emerald-500/30 flex items-center justify-center rounded-2xl shadow-xl mb-4">
        <span class="material-symbols-outlined text-emerald-400 text-3xl font-light">agriculture</span>
      </div>
      <h1 class="text-2xl font-extrabold text-white tracking-tight">AgriPulse Enterprise</h1>
      <p class="text-emerald-500/70 text-xs font-semibold uppercase tracking-wider mt-1">HR Administration Portal</p>
    </div>

    <!-- Login card -->
    <div class="glass rounded-3xl p-8 shadow-2xl flex flex-col">
      <h2 class="text-xl font-bold text-slate-800 mb-6">Sign In</h2>
      
      <div id="errorBanner" class="hidden mb-4 p-3 bg-red-100 border border-red-200 text-red-700 rounded-xl text-xs font-medium"></div>

      <form id="loginForm" class="flex flex-col gap-4">
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2" for="username">Username or Email</label>
          <input class="w-full px-4 py-3 bg-slate-100 border border-slate-200 rounded-xl text-slate-800 text-sm focus:outline-none focus:border-emerald-500 focus:bg-white transition-all font-medium" type="text" id="username" placeholder="admin" required>
        </div>
        
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2" for="password">Password</label>
          <input class="w-full px-4 py-3 bg-slate-100 border border-slate-200 rounded-xl text-slate-800 text-sm focus:outline-none focus:border-emerald-500 focus:bg-white transition-all font-medium" type="password" id="password" placeholder="••••••••" required>
        </div>

        <button type="submit" id="submitBtn" class="w-full mt-2 py-3.5 bg-gradient-to-r from-emerald-600 to-teal-700 hover:from-emerald-500 hover:to-teal-600 text-white rounded-xl font-bold text-sm shadow-lg shadow-emerald-950/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
          <span>Authenticate</span>
          <span class="material-symbols-outlined text-base">login</span>
        </button>
      </form>
    </div>

    <!-- Contact support info -->
    <p class="text-center text-slate-500 text-xs mt-8">
      Sri Sri Sugar Co-operative Ltd. &bull; <a href="mailto:software@srisrisugar.com" class="text-emerald-400 hover:underline">Contact Support</a>
    </p>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // Clear any stale sessions
      AgriAuth.clearSession();

      const form = document.getElementById("loginForm");
      const submitBtn = document.getElementById("submitBtn");
      const errorBanner = document.getElementById("errorBanner");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        
        const usernameVal = document.getElementById("username").value.trim();
        const passwordVal = document.getElementById("password").value;

        if (!usernameVal || !passwordVal) return;

        // Show spinner / loading state
        submitBtn.disabled = true;
        submitBtn.innerHTML = `<span>Verifying...</span> <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>`;
        errorBanner.classList.add("hidden");

        try {
          const res = await AgriAuth.apiFetch("/api/auth/login", {
            method: "POST",
            body: { username: usernameVal, password: passwordVal }
          });

          if (!res.ok) {
            const data = await res.json().catch(() => ({}));
            throw new Error(data.detail || "Authentication failed. Invalid username or password.");
          }

          const session = await res.json();
          
          if (session.role !== "hr") {
            throw new Error("Access denied. This portal requires HR administrative privileges.");
          }

          // Save session
          AgriAuth.setSession(session);

          // Success animation
          submitBtn.className = "w-full mt-2 py-3.5 bg-emerald-500 text-white rounded-xl font-bold text-sm flex items-center justify-center gap-2";
          submitBtn.innerHTML = `<span>Access Granted</span> <span class="material-symbols-outlined text-base">check_circle</span>`;

          setTimeout(() => {
            window.location.replace("hr_dashboard.html");
          }, 600);

        } catch (err) {
          submitBtn.disabled = false;
          submitBtn.className = "w-full mt-2 py-3.5 bg-gradient-to-r from-emerald-600 to-teal-700 hover:from-emerald-500 hover:to-teal-600 text-white rounded-xl font-bold text-sm shadow-lg active:scale-[0.98] transition-all flex items-center justify-center gap-2";
          submitBtn.innerHTML = `<span>Authenticate</span> <span class="material-symbols-outlined text-base">login</span>`;
          errorBanner.textContent = err.message;
          errorBanner.classList.remove("hidden");
        }
      });
    });
  </script>
</body>
</html>
